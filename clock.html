<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .local-time-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .local-label {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .local-city {
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .local-time {
            font-size: 6em;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .local-date {
            font-size: 1.5em;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .local-timezone {
            font-size: 1.1em;
            opacity: 0.7;
        }

        .day-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3em;
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
        }

        .day-icon {
            font-size: 1.8em;
        }

        .add-city-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .add-city-form {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .add-city-form select, .add-city-form button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .add-city-form select {
            flex: 1;
            min-width: 250px;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .add-city-form button {
            background: #10b981;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .add-city-form button:hover {
            background: #059669;
        }

        .world-clocks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.8);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        .city-name {
            font-size: 1.8em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timezone-info {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 15px;
        }

        .clock-time {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 1.1em;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .time-diff {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .day-night {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .day-night-icon {
            font-size: 1.5em;
        }

        @media (max-width: 768px) {
            .local-time {
                font-size: 4em;
            }
            
            .clock-time {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 World Clock</h1>
        
        <div class="local-time-card">
            <div class="local-label">Your Local Time</div>
            <div class="local-city" id="localCity">Loading...</div>
            <div class="local-time" id="localTime">--:--:--</div>
            <div class="local-date" id="localDate">Loading...</div>
            <div class="local-timezone" id="localTimezone"></div>
            <div class="day-indicator" id="localDayNight">
                <span class="day-icon">☀️</span>
                <span>Day</span>
            </div>
        </div>

        <div class="add-city-section">
            <div class="add-city-form">
                <select id="citySelect">
                    <option value="">Select a city to add...</option>
                </select>
                <button onclick="addCity()">➕ Add City</button>
            </div>
        </div>

        <div class="world-clocks" id="worldClocks"></div>
    </div>

    <script>
        const cities = [
            { name: 'New York', timezone: 'America/New_York', country: 'USA' },
            { name: 'London', timezone: 'Europe/London', country: 'UK' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo', country: 'Japan' },
            { name: 'Paris', timezone: 'Europe/Paris', country: 'France' },
            { name: 'Sydney', timezone: 'Australia/Sydney', country: 'Australia' },
            { name: 'Dubai', timezone: 'Asia/Dubai', country: 'UAE' },
            { name: 'Singapore', timezone: 'Asia/Singapore', country: 'Singapore' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong', country: 'China' },
            { name: 'Los Angeles', timezone: 'America/Los_Angeles', country: 'USA' },
            { name: 'Chicago', timezone: 'America/Chicago', country: 'USA' },
            { name: 'Toronto', timezone: 'America/Toronto', country: 'Canada' },
            { name: 'Berlin', timezone: 'Europe/Berlin', country: 'Germany' },
            { name: 'Moscow', timezone: 'Europe/Moscow', country: 'Russia' },
            { name: 'Mumbai', timezone: 'Asia/Kolkata', country: 'India' },
            { name: 'Shanghai', timezone: 'Asia/Shanghai', country: 'China' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo', country: 'Brazil' },
            { name: 'Mexico City', timezone: 'America/Mexico_City', country: 'Mexico' },
            { name: 'Seoul', timezone: 'Asia/Seoul', country: 'South Korea' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok', country: 'Thailand' },
            { name: 'Istanbul', timezone: 'Europe/Istanbul', country: 'Turkey' },
            { name: 'Amsterdam', timezone: 'Europe/Amsterdam', country: 'Netherlands' },
            { name: 'Madrid', timezone: 'Europe/Madrid', country: 'Spain' },
            { name: 'Rome', timezone: 'Europe/Rome', country: 'Italy' },
            { name: 'Zurich', timezone: 'Europe/Zurich', country: 'Switzerland' },
            { name: 'Stockholm', timezone: 'Europe/Stockholm', country: 'Sweden' },
            { name: 'Cairo', timezone: 'Africa/Cairo', country: 'Egypt' },
            { name: 'Johannesburg', timezone: 'Africa/Johannesburg', country: 'South Africa' },
            { name: 'Auckland', timezone: 'Pacific/Auckland', country: 'New Zealand' },
            { name: 'Vancouver', timezone: 'America/Vancouver', country: 'Canada' },
            { name: 'Buenos Aires', timezone: 'America/Argentina/Buenos_Aires', country: 'Argentina' }
        ];

        let selectedCities = [];
        const localTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        function populateCitySelect() {
            const select = document.getElementById('citySelect');
            cities.sort((a, b) => a.name.localeCompare(b.name));
            
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city.timezone;
                option.textContent = `${city.name}, ${city.country}`;
                option.dataset.name = city.name;
                select.appendChild(option);
            });
        }

        function isDaytime(timezone) {
            const now = new Date();
            const hour = parseInt(now.toLocaleTimeString('en-US', { 
                timeZone: timezone, 
                hour: '2-digit', 
                hour12: false 
            }));
            return hour >= 6 && hour < 18;
        }

        function getDayNightDisplay(timezone) {
            const isDay = isDaytime(timezone);
            return {
                icon: isDay ? '☀️' : '🌙',
                text: isDay ? 'Day' : 'Night'
            };
        }

        function getTimeDifference(targetTimezone) {
            const now = new Date();
            const localOffset = now.getTimezoneOffset();
            
            const localTime = new Date(now.toLocaleString('en-US', { timeZone: localTimezone }));
            const targetTime = new Date(now.toLocaleString('en-US', { timeZone: targetTimezone }));
            
            const diffMs = targetTime - localTime;
            const diffHours = Math.round(diffMs / (1000 * 60 * 60));
            
            if (diffHours === 0) return 'Same time';
            const sign = diffHours > 0 ? '+' : '';
            return `${sign}${diffHours} hours`;
        }

        function updateLocalTime() {
            const now = new Date();
            
            const time = now.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit'
            });
            
            const date = now.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const cityName = localTimezone.split('/').pop().replace(/_/g, ' ');
            
            document.getElementById('localTime').textContent = time;
            document.getElementById('localDate').textContent = date;
            document.getElementById('localCity').textContent = cityName;
            document.getElementById('localTimezone').textContent = `(${localTimezone})`;
            
            const dayNight = getDayNightDisplay(localTimezone);
            document.getElementById('localDayNight').innerHTML = `
                <span class="day-icon">${dayNight.icon}</span>
                <span>${dayNight.text}</span>
            `;
        }

        function updateWorldClocks() {
            const container = document.getElementById('worldClocks');
            container.innerHTML = '';
            
            selectedCities.forEach((city, index) => {
                const now = new Date();
                
                const time = now.toLocaleTimeString('en-US', { 
                    timeZone: city.timezone,
                    hour12: false, 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit'
                });
                
                const date = now.toLocaleDateString('en-US', { 
                    timeZone: city.timezone,
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric'
                });
                
                const timeDiff = getTimeDifference(city.timezone);
                const dayNight = getDayNightDisplay(city.timezone);
                
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <button class="remove-btn" onclick="removeCity(${index})">×</button>
                    <div class="city-name">${city.name}</div>
                    <div class="timezone-info">${city.timezone}</div>
                    <div class="clock-time">${time}</div>
                    <div class="clock-date">${date}</div>
                    <div class="time-diff">${timeDiff}</div>
                    <div class="day-night">
                        <span class="day-night-icon">${dayNight.icon}</span>
                        <span>${dayNight.text}</span>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function addCity() {
            const select = document.getElementById('citySelect');
            const selectedOption = select.options[select.selectedIndex];
            
            if (!selectedOption.value) return;
            
            const timezone = selectedOption.value;
            const name = selectedOption.dataset.name;
            
            if (selectedCities.some(city => city.timezone === timezone)) {
                alert('This city is already added!');
                return;
            }
            
            selectedCities.push({ name, timezone });
            saveCities();
            updateWorldClocks();
            select.selectedIndex = 0;
        }

        function removeCity(index) {
            selectedCities.splice(index, 1);
            saveCities();
            updateWorldClocks();
        }

        function saveCities() {
            const citiesData = {};
            selectedCities.forEach((city, index) => {
                citiesData[`city_${index}`] = JSON.stringify(city);
            });
            
            for (let key in citiesData) {
                try {
                    const data = citiesData[key];
                    document.cookie = `${key}=${encodeURIComponent(data)}; path=/; max-age=31536000`;
                } catch (e) {
                    console.error('Error saving city:', e);
                }
            }
        }

        function loadCities() {
            const cookies = document.cookie.split(';');
            const loadedCities = [];
            
            cookies.forEach(cookie => {
                const [key, value] = cookie.trim().split('=');
                if (key.startsWith('city_')) {
                    try {
                        const city = JSON.parse(decodeURIComponent(value));
                        loadedCities.push(city);
                    } catch (e) {
                        console.error('Error loading city:', e);
                    }
                }
            });
            
            if (loadedCities.length > 0) {
                selectedCities = loadedCities;
            } else {
                selectedCities = [
                    { name: 'New York', timezone: 'America/New_York' },
                    { name: 'London', timezone: 'Europe/London' },
                    { name: 'Tokyo', timezone: 'Asia/Tokyo' },
                    { name: 'Sydney', timezone: 'Australia/Sydney' }
                ];
            }
        }

        function updateAll() {
            updateLocalTime();
            updateWorldClocks();
        }

        populateCitySelect();
        loadCities();
        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
