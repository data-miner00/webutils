<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Converter & Utilities</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .main-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .color-picker-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .picker-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .color-display {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            border: 3px solid #ddd;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .color-display:hover {
            transform: scale(1.02);
        }

        .picker-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .random-btn {
            flex: 1;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .random-btn:hover {
            background: #5568d3;
        }

        .formats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .format-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
        }

        .format-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .format-value {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .format-value:hover {
            background: #f0f4ff;
        }

        .copy-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #059669;
        }

        .copy-btn.copied {
            background: #6366f1;
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .palette-section {
            margin-top: 30px;
        }

        .palette-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .palette-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .palette-btn:hover {
            background: #5568d3;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        .palette-color {
            height: 100px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .palette-color:hover {
            transform: scale(1.05);
        }

        .gradient-section {
            margin-top: 30px;
        }

        .gradient-display {
            height: 150px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid #ddd;
        }

        .gradient-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .gradient-controls label {
            font-weight: 600;
            color: #555;
        }

        .gradient-controls select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .contrast-section {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .contrast-card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            text-align: center;
        }

        .contrast-demo {
            height: 120px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .contrast-ratio {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
            margin: 10px 0;
        }

        .wcag-info {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .wcag-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .wcag-pass {
            background: #d1fae5;
            color: #065f46;
        }

        .wcag-fail {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .color-picker-section {
                grid-template-columns: 1fr;
            }
            
            .contrast-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Converter & Utilities</h1>
        <p class="subtitle">Convert, generate, and explore colors in multiple formats</p>
        
        <div class="main-section">
            <div class="section-title">🎯 Color Picker & Converter</div>
            
            <div class="color-picker-section">
                <div class="picker-container">
                    <div class="color-display" id="colorDisplay" onclick="document.getElementById('colorPicker').click()"></div>
                    <div class="picker-input-group">
                        <input type="color" id="colorPicker" value="#667eea">
                        <button class="random-btn" onclick="generateRandomColor()">🎲 Random Color</button>
                    </div>
                </div>
                
                <div class="formats-grid" id="formatsGrid"></div>
            </div>

            <div class="palette-section">
                <div class="section-title">🎨 Color Palettes</div>
                <div class="palette-controls">
                    <button class="palette-btn" onclick="generatePalette('monochromatic')">Monochromatic</button>
                    <button class="palette-btn" onclick="generatePalette('analogous')">Analogous</button>
                    <button class="palette-btn" onclick="generatePalette('complementary')">Complementary</button>
                    <button class="palette-btn" onclick="generatePalette('triadic')">Triadic</button>
                    <button class="palette-btn" onclick="generatePalette('tetradic')">Tetradic</button>
                </div>
                <div class="palette-grid" id="paletteGrid"></div>
            </div>

            <div class="gradient-section">
                <div class="section-title">🌈 Gradient Generator</div>
                <div class="gradient-controls">
                    <label>Direction:</label>
                    <select id="gradientDirection" onchange="updateGradient()">
                        <option value="to right">Left to Right</option>
                        <option value="to left">Right to Left</option>
                        <option value="to bottom">Top to Bottom</option>
                        <option value="to top">Bottom to Top</option>
                        <option value="to bottom right">Diagonal ↘</option>
                        <option value="to bottom left">Diagonal ↙</option>
                    </select>
                    <button class="palette-btn" onclick="addGradientColor()">+ Add Color</button>
                </div>
                <div class="gradient-display" id="gradientDisplay"></div>
                <div class="format-item">
                    <div class="format-label">
                        CSS Gradient
                        <button class="copy-btn" onclick="copyText('gradientCSS')">Copy</button>
                    </div>
                    <div class="format-value" id="gradientCSS" onclick="copyText('gradientCSS')"></div>
                </div>
            </div>

            <div class="contrast-section">
                <div class="contrast-card">
                    <h3>Contrast with White</h3>
                    <div class="contrast-demo" id="contrastWhite">Sample Text</div>
                    <div class="contrast-ratio" id="ratioWhite">-</div>
                    <div class="wcag-info" id="wcagWhite"></div>
                </div>
                <div class="contrast-card">
                    <h3>Contrast with Black</h3>
                    <div class="contrast-demo" id="contrastBlack">Sample Text</div>
                    <div class="contrast-ratio" id="ratioBlack">-</div>
                    <div class="wcag-info" id="wcagBlack"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentColor = '#667eea';
        let gradientColors = ['#667eea', '#764ba2'];

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function rgbToHsv(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const d = max - min;
            let h, s = max === 0 ? 0 : d / max;
            const v = max;

            if (max === min) {
                h = 0;
            } else {
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                v: Math.round(v * 100)
            };
        }

        function rgbToCmyk(r, g, b) {
            let c = 1 - (r / 255);
            let m = 1 - (g / 255);
            let y = 1 - (b / 255);
            let k = Math.min(c, m, y);

            if (k === 1) {
                c = m = y = 0;
            } else {
                c = (c - k) / (1 - k);
                m = (m - k) / (1 - k);
                y = (y - k) / (1 - k);
            }

            return {
                c: Math.round(c * 100),
                m: Math.round(m * 100),
                y: Math.round(y * 100),
                k: Math.round(k * 100)
            };
        }

        function getLuminance(r, g, b) {
            const a = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function getContrastRatio(rgb1, rgb2) {
            const lum1 = getLuminance(rgb1.r, rgb1.g, rgb1.b);
            const lum2 = getLuminance(rgb2.r, rgb2.g, rgb2.b);
            const brightest = Math.max(lum1, lum2);
            const darkest = Math.min(lum1, lum2);
            return (brightest + 0.05) / (darkest + 0.05);
        }

        function updateColor(hex) {
            currentColor = hex;
            document.getElementById('colorDisplay').style.backgroundColor = hex;
            document.getElementById('colorPicker').value = hex;

            const rgb = hexToRgb(hex);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
            const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);

            const formats = [
                { label: 'HEX', value: hex.toUpperCase() },
                { label: 'RGB', value: `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})` },
                { label: 'RGBA', value: `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 1)` },
                { label: 'HSL', value: `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)` },
                { label: 'HSLA', value: `hsla(${hsl.h}, ${hsl.s}%, ${hsl.l}%, 1)` },
                { label: 'HSV', value: `hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)` },
                { label: 'CMYK', value: `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)` },
                { label: 'RGB Decimal', value: `${rgb.r}, ${rgb.g}, ${rgb.b}` }
            ];

            const grid = document.getElementById('formatsGrid');
            grid.innerHTML = formats.map(format => `
                <div class="format-item">
                    <div class="format-label">
                        ${format.label}
                        <button class="copy-btn" onclick="copyValue('${format.value}', event)">Copy</button>
                    </div>
                    <div class="format-value" onclick="copyValue('${format.value}', event)">${format.value}</div>
                </div>
            `).join('');

            updateContrast();
            updateGradient();
        }

        function updateContrast() {
            const rgb = hexToRgb(currentColor);
            const white = { r: 255, g: 255, b: 255 };
            const black = { r: 0, g: 0, b: 0 };

            const ratioWhite = getContrastRatio(rgb, white);
            const ratioBlack = getContrastRatio(rgb, black);

            document.getElementById('contrastWhite').style.backgroundColor = currentColor;
            document.getElementById('contrastWhite').style.color = '#ffffff';
            document.getElementById('ratioWhite').textContent = ratioWhite.toFixed(2) + ':1';

            document.getElementById('contrastBlack').style.backgroundColor = currentColor;
            document.getElementById('contrastBlack').style.color = '#000000';
            document.getElementById('ratioBlack').textContent = ratioBlack.toFixed(2) + ':1';

            const wcagWhite = getWCAGBadges(ratioWhite);
            const wcagBlack = getWCAGBadges(ratioBlack);

            document.getElementById('wcagWhite').innerHTML = wcagWhite;
            document.getElementById('wcagBlack').innerHTML = wcagBlack;
        }

        function getWCAGBadges(ratio) {
            const aa = ratio >= 4.5;
            const aaa = ratio >= 7;
            const aaLarge = ratio >= 3;

            return `
                <span class="wcag-badge ${aa ? 'wcag-pass' : 'wcag-fail'}">${aa ? '✓' : '✗'} AA</span>
                <span class="wcag-badge ${aaa ? 'wcag-pass' : 'wcag-fail'}">${aaa ? '✓' : '✗'} AAA</span>
                <span class="wcag-badge ${aaLarge ? 'wcag-pass' : 'wcag-fail'}">${aaLarge ? '✓' : '✗'} AA Large</span>
            `;
        }

        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r = 0, g = 0, b = 0;

            if (0 <= h && h < 60) { r = c; g = x; b = 0; }
            else if (60 <= h && h < 120) { r = x; g = c; b = 0; }
            else if (120 <= h && h < 180) { r = 0; g = c; b = x; }
            else if (180 <= h && h < 240) { r = 0; g = x; b = c; }
            else if (240 <= h && h < 300) { r = x; g = 0; b = c; }
            else if (300 <= h && h < 360) { r = c; g = 0; b = x; }

            r = Math.round((r + m) * 255);
            g = Math.round((g + m) * 255);
            b = Math.round((b + m) * 255);

            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function generatePalette(type) {
            const rgb = hexToRgb(currentColor);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            let colors = [];

            switch(type) {
                case 'monochromatic':
                    for (let i = 0; i < 6; i++) {
                        colors.push(hslToHex(hsl.h, hsl.s, 20 + i * 15));
                    }
                    break;
                case 'analogous':
                    colors = [
                        hslToHex((hsl.h - 30 + 360) % 360, hsl.s, hsl.l),
                        hslToHex((hsl.h - 15 + 360) % 360, hsl.s, hsl.l),
                        currentColor,
                        hslToHex((hsl.h + 15) % 360, hsl.s, hsl.l),
                        hslToHex((hsl.h + 30) % 360, hsl.s, hsl.l)
                    ];
                    break;
                case 'complementary':
                    colors = [
                        hslToHex(hsl.h, hsl.s, hsl.l - 20),
                        hslToHex(hsl.h, hsl.s, hsl.l - 10),
                        currentColor,
                        hslToHex((hsl.h + 180) % 360, hsl.s, hsl.l - 10),
                        hslToHex((hsl.h + 180) % 360, hsl.s, hsl.l),
                        hslToHex((hsl.h + 180) % 360, hsl.s, hsl.l + 10)
                    ];
                    break;
                case 'triadic':
                    colors = [
                        currentColor,
                        hslToHex((hsl.h + 120) % 360, hsl.s, hsl.l),
                        hslToHex((hsl.h + 240) % 360, hsl.s, hsl.l),
                        hslToHex(hsl.h, hsl.s, hsl.l - 15),
                        hslToHex((hsl.h + 120) % 360, hsl.s, hsl.l - 15),
                        hslToHex((hsl.h + 240) % 360, hsl.s, hsl.l - 15)
                    ];
                    break;
                case 'tetradic':
                    colors = [
                        currentColor,
                        hslToHex((hsl.h + 90) % 360, hsl.s, hsl.l),
                        hslToHex((hsl.h + 180) % 360, hsl.s, hsl.l),
                        hslToHex((hsl.h + 270) % 360, hsl.s, hsl.l)
                    ];
                    break;
            }

            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = colors.map(color => `
                <div class="palette-color" style="background-color: ${color}" onclick="updateColor('${color}')">
                    ${color.toUpperCase()}
                </div>
            `).join('');
        }

        function updateGradient() {
            const direction = document.getElementById('gradientDirection').value;
            const gradient = `linear-gradient(${direction}, ${gradientColors.join(', ')})`;
            
            document.getElementById('gradientDisplay').style.background = gradient;
            document.getElementById('gradientCSS').textContent = `background: ${gradient};`;
        }

        function addGradientColor() {
            gradientColors.push(currentColor);
            updateGradient();
        }

        function generateRandomColor() {
            const hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            updateColor(hex);
        }

        function copyValue(value, event) {
            const btn = event.target;
            navigator.clipboard.writeText(value).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            copyValue(text, event);
        }

        document.getElementById('colorPicker').addEventListener('input', (e) => {
            updateColor(e.target.value);
        });

        updateColor(currentColor);
        generatePalette('monochromatic');
    </script>
</body>
</html>
