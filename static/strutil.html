<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transformation Utilities</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        #inputText {
            min-height: 120px;
        }

        .output-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .output-item {
            position: relative;
        }

        .output-item label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .copy-btn.copied {
            background: #10b981;
        }

        .output-item textarea {
            min-height: 80px;
            background: #f9fafb;
        }

        .stats {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #555;
        }

        .stat-item {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Text Transformation Utilities</h1>
        
        <div class="input-section">
            <label for="inputText">Input Text</label>
            <textarea id="inputText" placeholder="Enter or paste your text here..."></textarea>
        </div>

        <div class="stats">
            <div class="stat-item">Characters: <span id="charCount">0</span></div>
            <div class="stat-item">Words: <span id="wordCount">0</span></div>
            <div class="stat-item">Lines: <span id="lineCount">0</span></div>
        </div>

        <div class="output-grid">
            <div class="output-item">
                <label>
                    lowercase
                    <button class="copy-btn" onclick="copyToClipboard('lowercase')">Copy</button>
                </label>
                <textarea id="lowercase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    UPPERCASE
                    <button class="copy-btn" onclick="copyToClipboard('uppercase')">Copy</button>
                </label>
                <textarea id="uppercase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    snake_case
                    <button class="copy-btn" onclick="copyToClipboard('snakeCase')">Copy</button>
                </label>
                <textarea id="snakeCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    camelCase
                    <button class="copy-btn" onclick="copyToClipboard('camelCase')">Copy</button>
                </label>
                <textarea id="camelCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    PascalCase
                    <button class="copy-btn" onclick="copyToClipboard('pascalCase')">Copy</button>
                </label>
                <textarea id="pascalCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    Title Case
                    <button class="copy-btn" onclick="copyToClipboard('titleCase')">Copy</button>
                </label>
                <textarea id="titleCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    kebab-case
                    <button class="copy-btn" onclick="copyToClipboard('kebabCase')">Copy</button>
                </label>
                <textarea id="kebabCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    CONSTANT_CASE
                    <button class="copy-btn" onclick="copyToClipboard('constantCase')">Copy</button>
                </label>
                <textarea id="constantCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    dot.case
                    <button class="copy-btn" onclick="copyToClipboard('dotCase')">Copy</button>
                </label>
                <textarea id="dotCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    Sentence case
                    <button class="copy-btn" onclick="copyToClipboard('sentenceCase')">Copy</button>
                </label>
                <textarea id="sentenceCase" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    Reversed
                    <button class="copy-btn" onclick="copyToClipboard('reversed')">Copy</button>
                </label>
                <textarea id="reversed" readonly></textarea>
            </div>

            <div class="output-item">
                <label>
                    Base64 Encoded
                    <button class="copy-btn" onclick="copyToClipboard('base64')">Copy</button>
                </label>
                <textarea id="base64" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');

        function toSnakeCase(str) {
            return str
                .replace(/([a-z])([A-Z])/g, '$1_$2')
                .replace(/[\s\-\.]+/g, '_')
                .toLowerCase()
                .replace(/[^a-z0-9_]/g, '');
        }

        function toCamelCase(str) {
            return str
                .replace(/[\s\-_\.]+(.)?/g, (_, c) => c ? c.toUpperCase() : '')
                .replace(/^[A-Z]/, c => c.toLowerCase())
                .replace(/[^a-zA-Z0-9]/g, '');
        }

        function toPascalCase(str) {
            return str
                .replace(/[\s\-_\.]+(.)?/g, (_, c) => c ? c.toUpperCase() : '')
                .replace(/^[a-z]/, c => c.toUpperCase())
                .replace(/[^a-zA-Z0-9]/g, '');
        }

        function toTitleCase(str) {
            return str.replace(/\w\S*/g, txt => 
                txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()
            );
        }

        function toKebabCase(str) {
            return str
                .replace(/([a-z])([A-Z])/g, '$1-$2')
                .replace(/[\s_\.]+/g, '-')
                .toLowerCase()
                .replace(/[^a-z0-9\-]/g, '');
        }

        function toConstantCase(str) {
            return toSnakeCase(str).toUpperCase();
        }

        function toDotCase(str) {
            return str
                .replace(/([a-z])([A-Z])/g, '$1.$2')
                .replace(/[\s\-_]+/g, '.')
                .toLowerCase()
                .replace(/[^a-z0-9\.]/g, '');
        }

        function toSentenceCase(str) {
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }

        function reverseString(str) {
            return str.split('').reverse().join('');
        }

        function updateTransformations() {
            const text = inputText.value;

            document.getElementById('lowercase').value = text.toLowerCase();
            document.getElementById('uppercase').value = text.toUpperCase();
            document.getElementById('snakeCase').value = toSnakeCase(text);
            document.getElementById('camelCase').value = toCamelCase(text);
            document.getElementById('pascalCase').value = toPascalCase(text);
            document.getElementById('titleCase').value = toTitleCase(text);
            document.getElementById('kebabCase').value = toKebabCase(text);
            document.getElementById('constantCase').value = toConstantCase(text);
            document.getElementById('dotCase').value = toDotCase(text);
            document.getElementById('sentenceCase').value = toSentenceCase(text);
            document.getElementById('reversed').value = reverseString(text);
            
            try {
                document.getElementById('base64').value = btoa(text);
            } catch (e) {
                document.getElementById('base64').value = 'Error: Invalid characters for Base64 encoding';
            }

            document.getElementById('charCount').textContent = text.length;
            document.getElementById('wordCount').textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('lineCount').textContent = text.split('\n').length;
        }

        function copyToClipboard(elementId) {
            const textarea = document.getElementById(elementId);
            const btn = event.target;
            
            navigator.clipboard.writeText(textarea.value).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        inputText.addEventListener('input', updateTransformations);
        
        updateTransformations();
    </script>
</body>
</html>
