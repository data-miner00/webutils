<!DOCTYPE html>
<html>

    <head>
        <title>Remove Common Leading Indentation</title>
<style>
  textarea {
      width: 100%;
      height: 200px;
      margin-bottom: 10px;
      font-family: monospace;
  }
  button {
      padding: 10px 20px;
      font-size: 16px;
  }
</style>
    </head>
    <body>

        <h1>Remove Common Leading Indentation</h1>
        <textarea id="inputText" placeholder="Place your multi-line text here..."></textarea>
        <button onclick="removeCommonIndent()">Clean text</button>
        <textarea id="outputText" placeholder="Cleaned text will appear here..."></textarea>

        <script>
            function removeCommonIndent() {
                const input = document.getElementById('inputText').value;
                const lines = input.split('\n');
                
                // Find minimum indent across all lines
                const minIndent = Math.min(...lines
                    .filter(line => line.trim().length > 0)
                    .map(line => line.match(/^(\s*)/)[0].length)
                    );

                // Remove that common indentation
                const cleaned = lines
                    .map(line => line.startsWith(' '.repeat(minIndent)) ? line.slice(minIndent) : line).join('\n');

                document.getElementById('outputText').value = cleaned;
            }
        </script>
    </body>
</html>
